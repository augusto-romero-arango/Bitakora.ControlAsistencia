name: Smoke Tests (todos los dominios)

on:
  workflow_dispatch:

jobs:
  discovery:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: echo "matrix=$(cat .github/smoke-tests-dominios.json)" >> $GITHUB_OUTPUT

  smoke-test:
    needs: discovery
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discovery.outputs.matrix) }}
    uses: ./.github/workflows/smoke-tests-dominio.yml
    with:
      base_url: ${{ matrix.base_url }}
      test_project: ${{ matrix.test_project }}
    secrets:
      SERVICEBUS_CONNECTION_STRING: ${{ secrets.SERVICEBUS_CONNECTION_STRING }}
      POSTGRES_CONNECTION_STRING: ${{ secrets.POSTGRES_CONNECTION_STRING }}
