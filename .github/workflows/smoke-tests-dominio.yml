name: Smoke Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL base de la Function App'
        required: false
        default: 'https://func-asist-dev-programacion.azurewebsites.net'
      test_project:
        description: 'Ruta al proyecto de smoke tests'
        required: false
        default: 'tests/Bitakora.ControlAsistencia.Programacion.SmokeTests/'
  workflow_call:
    inputs:
      base_url:
        type: string
        required: false
        default: 'https://func-asist-dev-programacion.azurewebsites.net'
      test_project:
        type: string
        required: false
        default: 'tests/Bitakora.ControlAsistencia.Programacion.SmokeTests/'
    secrets:
      SERVICEBUS_CONNECTION_STRING:
        required: false
      POSTGRES_CONNECTION_STRING:
        required: false

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Smoke tests
        env:
          Api__BaseUrl: ${{ inputs.base_url }}
          ServiceBus__ConnectionString: ${{ secrets.SERVICEBUS_CONNECTION_STRING }}
          Postgres__ConnectionString: ${{ secrets.POSTGRES_CONNECTION_STRING }}
        run: dotnet test --project ${{ inputs.test_project }} --configuration Release
