name: Deploy Programacion

on:
  push:
    branches: [main]
    paths:
      - 'src/Bitakora.ControlAsistencia.Programacion/**'
      - 'src/Bitakora.ControlAsistencia.Contracts/**'
      - 'infra/environments/dev/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ControlAsistencias.slnx

      - name: Build
        run: dotnet build ControlAsistencias.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test ControlAsistencias.slnx --no-build --configuration Release

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Bitakora.ControlAsistencia.Programacion/

      - name: Publish
        run: |
          dotnet publish src/Bitakora.ControlAsistencia.Programacion/ \
            --configuration Release \
            --no-restore \
            --output ./publish

      - name: Validar artefacto de publicacion
        run: |
          test -f ./publish/host.json
          test -f ./publish/functions.metadata
          test -f ./publish/Bitakora.ControlAsistencia.Programacion.dll

      - name: Azure Authentication
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-asist-dev-programacion
          package: ./publish

      - name: Smoke test
        run: |
          echo "Esperando 30s para que la Function App arranque..."
          sleep 30
          curl -f "https://func-asist-dev-programacion.azurewebsites.net/api/health"
