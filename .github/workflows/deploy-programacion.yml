name: Deploy Programacion

on:
  push:
    branches: [main]
    paths:
      - 'src/Bitakora.ControlAsistencia.Programacion/**'
      - 'src/Bitakora.ControlAsistencia.Contracts/**'
      - 'infra/environments/dev/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Bitakora.ControlAsistencia.Programacion/

      - name: Publish
        run: |
          dotnet publish src/Bitakora.ControlAsistencia.Programacion/ \
            --configuration Release \
            --no-restore \
            --output ./publish

      - name: Azure Authentication
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-asist-dev-programacion
          package: ./publish
