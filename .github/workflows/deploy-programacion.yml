name: Deploy Programacion

on:
  push:
    branches: [main]
    paths:
      - 'src/Bitakora.ControlAsistencia.Programacion/**'
      - 'src/Bitakora.ControlAsistencia.Contracts/**'
      - 'infra/environments/dev/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ControlAsistencias.slnx

      - name: Build
        run: dotnet build ControlAsistencias.slnx --no-restore --configuration Release

      - name: Test
        run: |
          for proj in tests/Bitakora.ControlAsistencia.*.Tests/; do
            dotnet test --project "$proj" --no-build --configuration Release --ignore-exit-code 8
          done

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Bitakora.ControlAsistencia.Programacion/ -r linux-x64

      - name: Build
        run: |
          dotnet build src/Bitakora.ControlAsistencia.Programacion/ \
            --configuration Release \
            --no-restore \
            -r linux-x64

      - name: Publish
        run: |
          dotnet publish src/Bitakora.ControlAsistencia.Programacion/ \
            --configuration Release \
            --no-build \
            -r linux-x64 \
            --self-contained false \
            --output ./publish

      - name: Validar artefacto de publicacion
        run: |
          test -f ./publish/host.json
          test -f ./publish/functions.metadata
          test -f ./publish/Bitakora.ControlAsistencia.Programacion.dll

      - name: Azure Authentication
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-asist-dev-programacion
          package: ./publish

      - name: Esperar arranque de Function App
        run: |
          echo "Esperando 30s para que la Function App arranque..."
          sleep 30

  smoke-tests:
    needs: deploy
    uses: ./.github/workflows/smoke-tests.yml
    with:
      test_project: tests/Bitakora.ControlAsistencia.Programacion.SmokeTests/
    secrets:
      SERVICEBUS_CONNECTION_STRING: ${{ secrets.SERVICEBUS_CONNECTION_STRING }}
