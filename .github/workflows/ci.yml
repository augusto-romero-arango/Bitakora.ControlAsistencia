name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ControlAsistencias.slnx

      - name: Build
        run: dotnet build ControlAsistencias.slnx --no-restore --configuration Release

      - name: Test con cobertura
        run: >-
          dotnet test ControlAsistencias.slnx
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Generar reporte de cobertura
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: 'coverage/**/coverage.cobertura.xml'
          targetdir: 'coverage/report'
          reporttypes: 'MarkdownSummaryGithub'

      - name: Publicar resumen en Job Summary
        run: cat coverage/report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comentar cobertura en el PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: coverage/report/SummaryGithub.md
