name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ControlAsistencias.slnx

      - name: Build
        run: dotnet build ControlAsistencias.slnx --no-restore --configuration Release

      - name: Instalar dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Test con cobertura
        run: >-
          dotnet-coverage collect
          --output coverage/coverage.cobertura.xml
          --output-format cobertura
          "bash -c 'exit_code=0; for proj in tests/Bitakora.ControlAsistencia.*.Tests/; do dotnet test --project \"$proj\" --no-build --configuration Release --ignore-exit-code 8 || exit_code=$?; done; exit $exit_code'"

      - name: Generar reporte de cobertura
        if: always()
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: 'coverage/coverage.cobertura.xml'
          targetdir: 'coverage/report'
          reporttypes: 'MarkdownSummaryGithub'

      - name: Publicar resumen en Job Summary
        run: cat coverage/report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comentar cobertura en el PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: coverage/report/SummaryGithub.md
