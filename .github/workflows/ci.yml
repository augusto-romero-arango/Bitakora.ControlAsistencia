name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ControlAsistencias.slnx

      - name: Build
        run: dotnet build ControlAsistencias.slnx --no-restore --configuration Release

      - name: Instalar dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Instrumentar assemblies (cobertura estatica)
        run: |
          # El profiler dinamico de dotnet-coverage no se inicializa en .NET 10.
          # La instrumentacion estatica produce datos reales de cobertura.
          for dll in tests/Bitakora.ControlAsistencia.*.Tests/bin/Release/net10.0/Bitakora.ControlAsistencia.*.dll; do
            [[ "$(basename "$dll")" == *Tests* ]] && continue
            echo "Instrumentando: $dll"
            dotnet-coverage instrument "$dll" --settings dotnet-coverage.settings.xml
          done

      - name: Test con cobertura
        run: |
          mkdir -p coverage
          i=0
          for proj in tests/Bitakora.ControlAsistencia.*.Tests/; do
            dotnet-coverage collect \
              --settings dotnet-coverage.settings.xml \
              --output "coverage/coverage-$i.cobertura.xml" \
              --output-format cobertura \
              "dotnet test --project $proj --no-build --configuration Release --ignore-exit-code 8"
            i=$((i + 1))
          done
          dotnet-coverage merge \
            --output coverage/coverage.cobertura.xml \
            --output-format cobertura \
            coverage/coverage-*.cobertura.xml

      - name: Generar reporte de cobertura
        if: always()
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: 'coverage/coverage.cobertura.xml'
          targetdir: 'coverage/report'
          reporttypes: 'MarkdownSummaryGithub;TextSummary'
          assemblyfilters: '+Bitakora.ControlAsistencia.*;-*.Tests'
          classfilters: '-*DirectFunctionExecutor;-*WorkerExtensionStartupCodeExecutor;-*GeneratedFunctionMetadataProvider;-*FunctionExecutorAutoStartup;-*FunctionExecutorHostBuilderExtensions;-*FunctionMetadataProviderAutoStartup;-*WorkerHostBuilderFunctionMetadataProviderExtension;-*HealthCheck;-*Program'

      - name: Publicar resumen en Job Summary
        if: always()
        run: |
          if [ -f coverage/report/SummaryGithub.md ]; then
            cat coverage/report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          fi
          # TextSummary incluye branch coverage cuando la instrumentacion lo soporta.
          # Si .NET 10 no produce datos de branches, TextSummary muestra solo line coverage
          # como fallback — evaluar coverlet cuando soporte .NET 10.
          if [ -f coverage/report/Summary.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat coverage/report/Summary.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comentar cobertura en el PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: coverage/report/SummaryGithub.md
