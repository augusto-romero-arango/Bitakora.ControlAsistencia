# Catalogo EDA — Bitakora.ControlAsistencia
#
# Fuente de verdad para eventos, comandos, policies y value objects del sistema.
# Actualizado por el agente `eda-modeler` al modelar flujos y por `planner` al crear issues.
# Validado por scripts/eda-lint.sh.
#
# REGLAS:
# - Si un objeto ya existe aqui, reutilizalo con el mismo nombre y payload exacto
# - No crear variantes (si existe TurnoAsignado, no crear TurnoFueAsignado)
# - Eventos: PascalCase en pasado (MarcacionRegistrada, TurnoAsignado)
# - Comandos: PascalCase imperativo (RegistrarMarcacion, AsignarTurno)
# - Policies: PascalCase descriptivo (DepuracionAutomatica)
#
# Ultima actualizacion: 2026-04-05 (TurnoCreado marcado como evento privado de event sourcing)

events:
  - name: TurnoCreado
    context: Programacion
    description: Un nuevo turno fue creado en el catalogo con su estructura de franjas completa
    visibility: private  # evento de event sourcing del aggregate, no se publica a Service Bus
    payload:
      - field: TurnoId
        type: Guid
      - field: Nombre
        type: string
      - field: FranjasOrdinarias
        type: List<FranjaOrdinaria>
        note: "Cada FranjaOrdinaria contiene sus Descansos y Extras ya asignados, con offsets inferidos"
    published_to: null  # se publicara cuando haya consumidores externos
    used_in: ["#3", "#4"]

commands:
  - name: CrearTurno
    context: Programacion
    description: Define un nuevo turno con sus franjas en el catalogo
    trigger: HTTP POST
    payload:
      - field: TurnoId
        type: Guid
        note: "Generado por el cliente (front)"
      - field: Nombre
        type: string
      - field: Ordinarias
        type: "List<(TimeOnly inicio, TimeOnly fin)>"
      - field: Descansos
        type: "List<(TimeOnly inicio, TimeOnly fin)>"
      - field: Extras
        type: "List<(TimeOnly inicio, TimeOnly fin)>"
    produces: [TurnoCreado]
    used_in: ["#3", "#4"]

policies: []

value_objects:
  - name: FranjaOrdinaria
    source: src/Bitakora.ControlAsistencia.Contracts/ValueObjects/FranjaOrdinaria.cs
    description: "Segmento continuo de trabajo. Contiene descansos y extras. HoraInicio, HoraFin, DiaOffsetFin, Descansos, Extras."
    used_in: ["#2"]

  - name: FranjaDescanso
    source: src/Bitakora.ControlAsistencia.Contracts/ValueObjects/FranjaDescanso.cs
    description: "Pausa operativa dentro de una ordinaria. HoraInicio, HoraFin, DiaOffsetInicio, DiaOffsetFin."
    used_in: ["#2"]

  - name: FranjaExtra
    source: src/Bitakora.ControlAsistencia.Contracts/ValueObjects/FranjaExtra.cs
    description: "Horas extras programadas dentro de una ordinaria. HoraInicio, HoraFin, DiaOffsetInicio, DiaOffsetFin."
    used_in: ["#2"]

  - name: Turno
    source: src/Bitakora.ControlAsistencia.Contracts/ValueObjects/Turno.cs
    description: Bloque de trabajo con franjas. Viaja completo en eventos (no como ID).
    used_in: []

  - name: DiaOperativo
    source: src/Bitakora.ControlAsistencia.Contracts/ValueObjects/DiaOperativo.cs
    description: "Dia de trabajo: fecha, marcaciones, indicador festivo"
    used_in: []

  - name: Marcacion
    source: src/Bitakora.ControlAsistencia.Contracts/ValueObjects/Marcacion.cs
    description: "Registro crudo: HoraEntrada, HoraSalida, EsAnomala"
    used_in: []

  - name: DesgloseHoras
    source: src/Bitakora.ControlAsistencia.Contracts/ValueObjects/DesgloseHoras.cs
    description: "Tiempos ordinarios/nocturnos/dominicales/extra/faltantes"
    used_in: []
