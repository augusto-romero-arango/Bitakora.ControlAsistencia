# .tmux.conf — Bitakora.ControlAsistencia
# Configuracion optimizada para iTerm2 en modo control (-CC).
# En modo -CC, iTerm2 maneja toda la UI (tabs, panes, scroll, clipboard).
# No se definen keybindings custom para evitar conflictos.
#
# Uso:
#   tmux -CC              # nueva sesion
#   tmux -CC attach       # reconectar sesion existente
#   tmux -CC attach -t nombre  # reconectar sesion especifica

# --- Colores y terminal ---
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# --- Mouse (por si se usa fuera de iTerm2 -CC) ---
set -g mouse on

# --- Scrollback ---
set -g history-limit 50000

# --- Numeracion desde 1 (mas natural para navegar con teclado) ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Titulos de sesion/ventana (visibles como nombres de tabs en iTerm2) ---
set -g set-titles on
set -g set-titles-string "#S / #W"

# --- Sin delay al presionar Escape (mejor experiencia en CLI) ---
set -sg escape-time 0

# --- Mantener servidor tmux vivo aunque se cierren todas las ventanas ---
set -g detach-on-destroy off

# --- Status bar (solo visible fuera de iTerm2 -CC mode) ---
set -g status-style "bg=colour235,fg=colour248"
set -g status-left "#[fg=colour39,bold] #S "
set -g status-right "#[fg=colour248] %H:%M "
set -g status-left-length 30
set -g window-status-current-style "fg=colour255,bold"
